name: Deploy web demo to GitHub Pages

# Publishes the clickable UI demo (demo data only — no live Bitwarden sync).
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: ["claude/epic-clarke-7mtm6z", "main"]
    paths:
      - "chrome-extension/**"
      - "web-demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: node web-demo/build.mjs
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages via API when the account/plan allows it (public
          # repos on any plan; private repos require GitHub Pro/Team/Enterprise).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# trigger: Pages enabled via Settings — deploy
